name: Author & Affiliation Pipeline

on:
  # Run weekly on Sundays at 12:00 UTC (incremental enrichment)
  schedule:
    - cron: '0 12 * * 0'
    # Quarterly full recheck on 1st of Jan/Apr/Jul/Oct at 06:00 UTC
    - cron: '0 6 1 1,4,7,10 *'
  
  # Allow manual trigger with optional full recheck
  workflow_dispatch:
    inputs:
      recheck:
        description: 'Recheck all affiliations (not just missing)'
        type: boolean
        default: false

jobs:
  author-analysis:
    runs-on: ubuntu-latest
    env:
      # Auto-enable recheck on quarterly schedule or manual trigger
      RECHECK: ${{ inputs.recheck == true || github.event.schedule == '0 6 1 1,4,7,10 *' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout reprodb.github.io repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/reprodb.github.io
          path: website
          ref: main
          token: ${{ secrets.CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements-ci.txt
      
      - name: Cache DBLP database
        uses: actions/cache@v5
        with:
          path: data/dblp/dblp.xml.gz
          key: dblp-${{ hashFiles('config/cache-version.txt') }}
          restore-keys: |
            dblp-
      
      - name: Download DBLP if not cached
        run: |
          if [ ! -f data/dblp/dblp.xml.gz ]; then
            echo "Downloading DBLP database (~1GB)..."
            mkdir -p data/dblp
            wget --tries=3 --waitretry=10 --timeout=300 \
              --user-agent="ReproDB-Pipeline/1.0 (GitHub Actions; +https://github.com/ReproDB/reprodb-pipeline)" \
              -q -O data/dblp/dblp.xml.gz https://dblp.org/xml/dblp.xml.gz
            echo "Download complete"
          else
            echo "Using cached DBLP database"
          fi
      
      - name: Generate author statistics
        run: |
          python -m src.generators.authors.generate_author_stats \
            --dblp_file data/dblp/dblp.xml.gz \
            --data_dir website/src \
            --output_dir website/src

      - name: "Build/update canonical author index"
        run: |
          python -m src.generators.authors.generate_author_index \
            --data_dir website/src
      
      - name: "Enrichment layer 1: CSRankings (offline faculty match)"
        continue-on-error: true
        run: |
          echo "Enriching affiliations from CSRankings..."
          python -m src.enrichers.enrich_affiliations_csrankings \
            --authors_file website/src/assets/data/authors.json \
            --output website/src/assets/data/authors.json \
            --data_dir website/src \
            --verbose || {
            echo "⚠️ CSRankings enrichment failed"
            echo "Continuing with existing affiliations..."
          }

      - name: "Enrichment layer 2: AE committee members (offline)"
        continue-on-error: true
        run: |
          echo "Enriching affiliations from AE committee data..."
          python -m src.enrichers.enrich_affiliations_ae_members \
            --authors_file website/src/assets/data/authors.json \
            --output website/src/assets/data/authors.json \
            --data_dir website/src \
            --verbose || {
            echo "⚠️ AE-member enrichment failed"
            echo "Continuing with existing affiliations..."
          }

      - name: "Enrichment layer 3: OpenAlex/S2/CrossRef paper disambiguation"
        continue-on-error: true
        timeout-minutes: 30
        run: |
          echo "Enriching affiliations from OpenAlex/CrossRef..."
          RECHECK_FLAG=""
          MAX_AUTHORS=500
          if [ "${{ env.RECHECK }}" = "true" ]; then
            RECHECK_FLAG="--recheck"
            MAX_AUTHORS=2000
            echo "Full recheck mode: re-querying all authors (max $MAX_AUTHORS)"
          fi
          python -m src.enrichers.enrich_affiliations_openalex \
            --authors_file website/src/_data/authors.yml \
            --papers_file website/src/assets/data/paper_authors_map.json \
            --data_dir website/src \
            --max_authors $MAX_AUTHORS \
            --verbose $RECHECK_FLAG || {
            echo "⚠️ OpenAlex enrichment did not complete"
            echo "Continuing with existing affiliations..."
          }

      - name: "Sync author index after enrichment"
        run: |
          echo "Syncing author index with enriched data..."
          python -m src.generators.authors.generate_author_index \
            --data_dir website/src

      - name: Check for enrichment changes
        id: check_changes
        run: |
          cd website
          if git diff --quiet; then
            echo "No data changes detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Data enrichment detected:"
            git diff --stat
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload DBLP analysis results
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: dblp-analysis-results
          path: |
            website/src/_data/authors.yml
            website/src/_data/author_summary.yml
            website/src/_data/papers.json
            website/src/assets/data/authors.json
            website/src/assets/data/author_index.json
            website/src/assets/data/paper_authors_map.json
            website/src/assets/data/papers.json
          retention-days: 7

      - name: Trigger statistics update
        if: steps.check_changes.outputs.changed == 'true' && github.repository_owner == 'ReproDB'
        run: gh workflow run update-stats.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
      
      - name: Summary
        run: |
          echo "## Author & Affiliation Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ DBLP database processed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Author index maintained (stable IDs)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Affiliations enriched" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Affiliation Enrichment Layers" >> $GITHUB_STEP_SUMMARY
          echo "1. **CSRankings** — offline faculty match (overwrites if found)" >> $GITHUB_STEP_SUMMARY
          echo "2. **AE committee** — offline member affiliation match" >> $GITHUB_STEP_SUMMARY
          echo "3. **OpenAlex/S2/CrossRef** — paper-based disambiguation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.RECHECK }}" = "true" ]; then
            echo "🔄 **Full recheck mode** — re-queried all authors" >> $GITHUB_STEP_SUMMARY
          else
            echo "📝 Incremental mode — only enriched missing affiliations" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "📊 Data changed — results uploaded and statistics update triggered" >> $GITHUB_STEP_SUMMARY
          else
            echo "📊 No data changes — statistics update skipped" >> $GITHUB_STEP_SUMMARY
          fi
